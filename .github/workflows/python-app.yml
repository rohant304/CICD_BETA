name: Flask CI pipeline


on: 
   push:
      branches:
           -main
   pull_request:
      branches:
            -main

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:

            -name:Checkout Repository
             uses: actions/checkout@v4

            -name: Setup Python
             uses: actions/setup-Python@v5
             with:
                 python-version:"3.10"
               run:
                 python -m pip install --upgrade pip
                 pip -r requirements.txt

            -name: Run Tests
             run: pytest -v
          
            



      
